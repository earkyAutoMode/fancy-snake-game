<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Snake Game - Neon Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>NEON SNAKE</h1>
            <div class="stats">
                <div class="stat-box">SCORE: <span id="score">0</span></div>
                <div id="multiplier-display" class="stat-box multiplier">x1.0</div>
                <div class="stat-box">HIGH: <span id="high-score">0</span></div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-screen" class="overlay">
                <h2>READY?</h2>
                <div class="speed-selector">
                    <p>SELECT SPEED</p>
                    <div class="speed-options">
                        <button class="speed-btn active" data-speed="180" data-mult="1.0">EASY</button>
